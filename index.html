function save() {
  localStorage.setItem("products", JSON.stringify(products));
}

function loginAdmin() {
  const pass = prompt("Contraseña admin");
  if (pass === ADMIN_PASSWORD) {
    isAdmin = true;
    render();
  }
}

function addToCart(name, price) {
  const item = cart.find(p => p.name === name);

  if (item) {
    item.qty += 1;
  } else {
    cart.push({ name, price, qty: 1 });
  }

  render();
}

function deleteToCart(name) {
  const item = cart.find(p => p.name === name);

  if (!item) return;

  item.qty -= 1;

  if (item.qty <= 0) {
    cart = cart.filter(p => p.name !== name);
  }

  render();
}

function total() {
  return cart.reduce((acc, item) => acc + item.price * item.qty, 0);
}

function sendWhatsApp() {
  const text =
    "Pedido:%0A" +
    cart.map(i => "- " + i.name + " x" + i.qty).join("%0A") +
    "%0ATotal: $" + total();

  window.open(whatsappLink + text, "_blank");
}

function updatePrice(cat, i, value) {
  products[cat][i].price = Number(value);
  render();
}

function deleteProduct(cat, i) {
  products[cat].splice(i, 1);
  render();
}

function render() {
  let html = "";

  html += `
  <div class="bg-pink-500 text-white text-center p-6">
    <h1 class="text-4xl font-bold italic tracking-wider">🍩 RICORICO</h1>

    ${cart.length > 0 ? `
      <button onclick="sendWhatsApp()"
        class="bg-white text-pink-600 px-4 py-2 mt-3 rounded">
        Pedido ($${total()})
      </button>
    ` : ""}
  </div>
  `;

html += `
<div class="bg-white sticky top-0 z-50 shadow p-2 flex gap-2 overflow-x-auto">

  <button onclick="selectedCategory=null; render()"
    class="bg-gray-200 px-4 py-2 rounded-full text-sm font-semibold">
    Todos
  </button>

  ${Object.keys(products).map(cat => `
    <button onclick="selectedCategory='${cat}'; render()"
  class="${selectedCategory === cat 
    ? 'bg-pink-500 text-white' 
    : 'bg-pink-100 text-pink-600'} px-4 py-2 rounded-full text-sm font-semibold whitespace-nowrap hover:bg-pink-500 hover:text-white transition">
  ${cat}
</button>
  `).join("")}

</div>
`;

  for (let cat in products) {

  if (selectedCategory && selectedCategory !== cat) continue;
  html += `<div class="p-4">
    <h2 id="${cat}" class="text-xl font-bold text-pink-600 capitalize">${cat}</h2>

    <div class="grid grid-cols-2 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">`;

  products[cat].forEach((p, i) => {
    html += `
    <div class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-lg transition">

      <img src="${p.img}" 
        class="w-full h-40 md:h-48 lg:h-52 object-cover transition-transform duration-300 hover:scale-105"/>

      <div class="p-2">
        <p class="font-bold">${p.name}</p>
        <p>$${p.price}</p>

        ${cart.find(c => c.name === p.name) ? `
          <p class="text-sm text-gray-600">
            Cantidad: ${cart.find(c => c.name === p.name).qty}
          </p>
        ` : ""}

        <button onclick='addToCart("${p.name}", ${p.price})'
  class="bg-pink-500 text-white w-full mt-1 rounded">
  Agregar
</button>

        <button onclick='deleteToCart("${p.name}")'
  class="bg-red-500 text-white w-full mt-1 rounded">
  Borrar
</button>

        ${isAdmin ? `
          <input type="number" value="${p.price}"
            onchange="updatePrice('${cat}',${i},this.value)"
            class="border w-full mt-1 rounded"/>

          <button onclick="deleteProduct('${cat}',${i})"
            class="bg-red-700 text-white w-full mt-1 rounded">
            Eliminar
          </button>

}
