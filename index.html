<head>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-pink-50">

<script>
const ADMIN_PASSWORD = "RicoRico220125";
const whatsappLink = "https://wa.me/5492617025691?text=";

let isAdmin = false;
let cart = [];

let products = {
  minidonas: [
    { name: "Donitas Simples", price: 4000, img: "https://i.postimg.cc/25P6v5N2/simples.png" },
    { name: "Donitas Chocolate", price: 4400, img: "https://i.postimg.cc/mBHxS8TR/Whats-App-Image-2026-04-20-at-08-52-18.jpg" },

    { name: "Donitas Rocklets", price: 4800, img: "https://i.postimg.cc/2mj4yDwf/Whats-App-Image-2026-04-21-at-20-41-36.jpg" },
    { name: "Donitas Crocantes", price: 4700, img: "https://i.postimg.cc/JzZbYtRF/Whats-App-Image-2026-04-20-at-10-10-48.jpg" },
    { name: "Donitas Glaseadas", price: 4400, img: "https://i.postimg.cc/Q8JkPNJ2/Whats-App-Image-2026-04-21-at-20-13-52.jpg" },
    { name: "Donitas Saborizadas", price: 4500, img: "https://i.postimg.cc/5bNphzGC/Whats-App-Image-2026-04-21-at-20-11-32.jpg" }
  ],

  alfajores: [
    { name: "Alfajores Maicena", price: 5000, img: "https://i.postimg.cc/2CWWM8zx/Whats-App-Image-2026-04-21-at-20-11-44.jpg" },
    { name: "Alfajores Chocolate", price: 8500, img: "https://i.postimg.cc/yKjLvnpy/Whats-App-Image-2026-04-21-at-20-15-47.jpg" },
    { name: "Alfajores Chips", price: 7000, img: "" }
  ],

  galletas: [
    { name: "Galletas Chips Chocolate", price: 3000, img: "https://i.postimg.cc/WNn5DgW7/Whats-App-Image-2026-04-23-at-19-41-09-(1).jpg" },
    { name: "Galletas Bañadas Chocolate", price: 4000, img: "https://i.postimg.cc/BSkBPp5C/Whats-App-Image-2026-04-21-at-20-15-58.jpg" },
    { name: "Galletas Saborizadas", price: 2700, img: "" },
    { name: "Galletas Marmoladas", price: 3200, img: "" },
    { name: "Galletas Craqueladas", price: 4500, img: "https://i.postimg.cc/51WJ8VPB/Whats-App-Image-2026-04-23-at-19-41-09.jpg" }
  ],

  bizcochuelos: [
    { name: "Bizcochuelo Marmolado", price: 9500, img: "" },
    { name: "Bizcochuelo Mandarina", price: 9500, img: "https://i.postimg.cc/yBxGJrKh/Whats-App-Image-2026-04-23-at-19-41-09-(2).jpg" },
    { name: "Bizcochuelo Limón", price: 9500, img: "" },
    { name: "Bizcochuelo Chocolate", price: 9500, img: "" }
  ],

  budines: [
    { name: "Budín Marmolado", price: 9500, img: "" },
    { name: "Budín Mandarina", price: 9500, img: "" },
    { name: "Budín Limón", price: 9500, img: "https://i.postimg.cc/ZZ5G858P/Whats-App-Image-2026-04-23-at-19-41-08-(1).jpg" },
    { name: "Budín Chocolate", price: 9500, img: "" }
  ],

  magdalenas: [
    { name: "Magdalena Chips Chocolate", price: 5000, img: "https://i.postimg.cc/Hp1zBBF4/Whats-App-Image-2026-04-23-at-19-41-08.jpg" },
    { name: "Magdalena Chocolate", price: 5000, img: "" },
    { name: "Magdalena Vainilla", price: 5000, img: "https://i.postimg.cc/26bdXLYb/Whats-App-Image-2026-04-23-at-19-52-34.jpg" }
  ],

  postrecitos: [
    { name: "Capchat", price: 3500, img: "https://i.postimg.cc/50Lg2QrN/Whats-App-Image-2026-04-23-at-20-03-40-(2).jpg" },
    { name: "Lemon Pie", price: 4000, img: "https://i.postimg.cc/VNS42VBk/Whats-App-Image-2026-04-23-at-20-03-40-(1).jpg" },
    { name: "Tarta de fruta", price: 3500, img: "https://i.postimg.cc/66Cb9FsC/Whats-App-Image-2026-04-23-at-20-03-40.jpg" },
    { name: "Postrecitos (oreo,chocotorta,etc)", price: 1500, img: "https://i.postimg.cc/W4KY3vbw/Whats-App-Image-2026-04-23-at-20-03-52.jpg"}   
  ]
};

function save() {
  localStorage.setItem("products", JSON.stringify(products));
}

function loginAdmin() {
  const pass = prompt("Contraseña admin");
  if (pass === ADMIN_PASSWORD) {
    isAdmin = true;
    render();
  }
}

function addToCart(name, price) {
  cart.push({ name, price });
  render();
}

function total() {
  return cart.reduce((a,b) => a + b.price, 0);
}

function sendWhatsApp() {
  const text =
    "Pedido:%0A" +
    cart.map(i => "- " + i.name).join("%0A") +
    "%0ATotal: $" + total();

  window.open(whatsappLink + text, "_blank");
}

function updatePrice(cat, i, value) {
  products[cat][i].price = Number(value);
  render();
}

function deleteProduct(cat, i) {
  products[cat].splice(i, 1);
  render();
}

function render() {
  let html = "";

  html += `
  <div class="bg-pink-500 text-white text-center p-6">
    <h1 class="text-4xl font-bold">🍩 RICORICO</h1>

    <button onclick="sendWhatsApp()"
      class="bg-white text-pink-600 px-4 py-2 mt-3 rounded">
      Pedido ($${total()})
    </button>
  </div>
  `;

  if (!isAdmin) {
    html += `
      <button onclick="loginAdmin()"
        class="fixed top-4 right-4 bg-yellow-400 px-3 py-1 rounded">
        Admin
      </button>
    `;
  }

  for (let cat in products) {
    html += `<div class="p-4">
      <h2 class="text-xl font-bold text-pink-600 capitalize">${cat}</h2>

      <div class="grid grid-cols-2 md:grid-cols-3 gap-4">`;

    products[cat].forEach((p, i) => {
      html += `
      <div class="bg-white p-3 rounded shadow">

        <img src="${p.img}" class="h-28 w-full object-cover rounded mb-1"/>

        <p class="font-bold">${p.name}</p>
        <p>$${p.price}</p>

        <button onclick="addToCart('${p.name}',${p.price})"
          class="bg-pink-500 text-white w-full mt-1">
          Agregar
        </button>

        <button onclick="deleteToCart('${p.name}',${p.price})"
          class="bg-pink-400 text-white w-full mt-1">
          Borrar
        </button>

        ${isAdmin ? `
          <input type="number" value="${p.price}"
            onchange="updatePrice('${cat}',${i},this.value)"
            class="border w-full mt-1"/>

          <button onclick="deleteProduct('${cat}',${i})"
            class="bg-red-500 text-white w-full mt-1">
            Eliminar
          </button>
        ` : ""}
      </div>
      `;
    });

    html += `</div></div>`;
  }

  document.body.innerHTML = html;
}

render();
</script>

</body>
</html>
